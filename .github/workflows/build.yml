name: SonarQube
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  sonarqube:
    runs-on: ubuntu-latest
    # Ephemeral Postgres for the dialect-divergence suite (Stage 2c-3). Job-scoped, health-gated so
    # steps don't run until it's ready. trust auth (no password) — idiomatic for a throwaway,
    # localhost-only CI service that's destroyed at job end, and leaves no credential to hardcode.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: recipe_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history, so issues map to commits
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run tests with coverage
        run: |
          pip install -r requirements.txt -r requirements-dev.txt pytest-cov
          pytest --cov=. --cov-report=xml     # writes coverage.xml
      # SQLite run above (DATABASE_URL unset -> SQLite; the PG suite skips). PG run below: DATABASE_URL
      # is scoped to THIS step only, so the SQLite run stays clean. Dual-dialect CI.
      - name: Run Postgres integration tests
        env:
          DATABASE_URL: postgresql+psycopg://postgres@localhost:5432/recipe_test
        run: |
          alembic upgrade head                  # create the schema on the CI Postgres service
          pytest tests/test_pg_integration.py   # DATABASE_URL is postgresql -> the 6 PG tests RUN
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run JS tests
        run: node --test tests/js          # client-side scaler/converter + factor-sync
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5   # check the Marketplace for the current version
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
