<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chef's Choice — Field Notes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Spectral = the single text serif (Option C: one voice — title, body, names, and the ledger's
     tabular figures + labels, kept distinct by treatment, not a second font). Caveat (the Round-2
     handwritten layer) is deliberately NOT loaded yet — its token is reserved in CSS. -->
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Everything is rendered into here by app.js -->
  <div class="page" id="app">
    <div class="notice"><p>Loading…</p></div>
  </div>

  <!-- Reference drawer (filled in on click) -->
  <div class="scrim" hidden></div>
  <aside class="panel" role="dialog" aria-modal="true" aria-labelledby="panel-name" hidden>
    <button class="panel-close" aria-label="Close">&times;</button>
    <p class="panel-kicker">Field guide</p>
    <h2 class="panel-name" id="panel-name"></h2>
    <p class="panel-desc"></p>

    <div class="panel-block">
      <h3>When it's in season</h3>
      <div class="season-host"></div>
    </div>

    <div class="panel-block">
      <h3>Where it grows</h3>
      <div class="tags regions"></div>
    </div>

    <div class="panel-block">
      <h3>Pairs well with</h3>
      <p class="pairs"></p>
    </div>

    <div class="panel-block used-block">
      <h3>In your recipes</h3>
      <ul class="used-list"></ul>
    </div>
  </aside>

  <!-- Backdate-a-cook modal (centered on the shared .scrim; filled/wired by app.js) -->
  <div class="backdate-modal" role="dialog" aria-modal="true" aria-labelledby="bd-title" hidden>
    <button class="panel-close" data-backdate-close aria-label="Close">&times;</button>
    <h2 class="bd-title" id="bd-title">Log a past cook</h2>
    <p class="bd-hint">Upload a past cook to help keep track of your progress…</p>
    <div class="bd-cols">
      <div class="bd-left">
        <div class="bd-cal" data-bd-cal></div>
        <input type="text" class="bd-typed" data-bd-typed placeholder="MM/DD/YYYY"
               inputmode="numeric" autocomplete="off" aria-label="Cook date (MM/DD/YYYY)">
      </div>
      <div class="bd-right">
        <div class="bd-photo" aria-hidden="true">
          <span class="bd-photo-ico">&oplus;</span>
          <span class="bd-photo-lbl">add a photo</span>
          <span class="bd-photo-cap">(photo — coming soon)</span>
        </div>
      </div>
    </div>
    <div class="bd-actions">
      <button class="btn alt" data-backdate-log>Log this cook</button>
      <span class="bd-error" data-bd-error aria-live="polite"></span>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
