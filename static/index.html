<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chef's Choice — Field Notes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Spectral = transitional text serif (body/title); IBM Plex Mono = tabular figures (amounts/labels).
     Caveat (the Round-2 handwritten layer) is deliberately NOT loaded yet — its token is reserved in CSS. -->
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Everything is rendered into here by app.js -->
  <div class="page" id="app">
    <div class="notice"><p>Loading…</p></div>
  </div>

  <!-- Reference drawer (filled in on click) -->
  <div class="scrim" hidden></div>
  <aside class="panel" role="dialog" aria-modal="true" aria-labelledby="panel-name" hidden>
    <button class="panel-close" aria-label="Close">&times;</button>
    <p class="panel-kicker">Field guide</p>
    <h2 class="panel-name" id="panel-name"></h2>
    <p class="panel-desc"></p>

    <div class="panel-block">
      <h3>When it's in season</h3>
      <div class="season-host"></div>
    </div>

    <div class="panel-block">
      <h3>Where it grows</h3>
      <div class="tags regions"></div>
    </div>

    <div class="panel-block">
      <h3>Pairs well with</h3>
      <p class="pairs"></p>
    </div>

    <div class="panel-block used-block">
      <h3>In your recipes</h3>
      <ul class="used-list"></ul>
    </div>
  </aside>

  <script src="scaler.js"></script>
  <script src="app.js"></script>
</body>
</html>
